# Standalone staging stack — completely independent from production.
# Uses staging-tagged images and an isolated DB volume.
# Production continues to run on port 80.
#
# Usage (from deploy-package/ directory):
#   docker compose -f docker-compose.staging.yml --env-file .env up -d
#   docker compose -f docker-compose.staging.yml --env-file .env down
#
# Access staging at: http://localhost:8081

name: ite-calibration-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ite-calibration-api:staging
    restart: unless-stopped
    environment:
      ITE_ENV:             staging
      ITE_DATABASE_URL:    ${ITE_DATABASE_URL}
      ITE_JWT_SECRET:      ${ITE_JWT_SECRET}
      ITE_ALLOWED_ORIGINS: http://localhost:8081
      ITE_DATA_DIR:        /var/lib/ite-calibration/data
    volumes:
      - cal_staging_data:/var/lib/ite-calibration/data
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ite-calibration-web:staging
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "8080"

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pg_staging_data:
  cal_staging_data:
