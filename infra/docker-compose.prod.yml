name: ite-calibration

# Production compose — used on the Windows deployment PC.
# Images are loaded from images/api.tar.gz and images/web.tar.gz by setup-windows.ps1.
# Do NOT use this file for development (use docker-compose.yml instead).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ite-calibration-api:latest
    restart: unless-stopped
    environment:
      ITE_ENV:          production
      ITE_DATABASE_URL: ${ITE_DATABASE_URL}
      ITE_JWT_SECRET:   ${ITE_JWT_SECRET}
      ITE_ALLOWED_ORIGINS: ${ITE_ALLOWED_ORIGINS}
      ITE_DATA_DIR:     /var/lib/ite-calibration/data
    volumes:
      - cal_data:/var/lib/ite-calibration/data
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ite-calibration-web:latest
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "8080"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pg_data:
  cal_data:
